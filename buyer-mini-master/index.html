<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kompetisi Saya — Buyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#344054;--muted:#818996;--faint:#a8adb7;--line:#e2e4e8;--divider:#eef0f7;--brand:#d22b50;--blue:#2b50c8;--green:#12b76a;--orange:#f79009;--red:#f04438}
    *{box-sizing:border-box} body{margin:0;background:#fff;color:var(--ink);font:14px/20px "Open Sans",Arial,sans-serif} button,input,select{font:inherit}
    .utility{height:48px;background:#f5f6f9;display:flex;align-items:center;justify-content:space-between;padding:0 48px;color:var(--muted);font-size:12px}.utility nav{display:flex;gap:28px}.utility a{color:inherit;text-decoration:none}.ship{color:var(--ink);font-weight:600}
    .header{height:74px;padding:8px 48px;display:flex;align-items:center;gap:24px;border-bottom:1px solid #ebebed}.logo{display:flex;align-items:center;gap:7px;width:104px;color:#2b50c8;font-weight:800}.logo-mark{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#2b50c8 0 45%,#d22b50 46%);transform:rotate(45deg)}.category{width:114px;height:58px;padding:0;border:0;background:none;color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer}.category-content{width:114px;height:40px;padding:8px 12px;display:flex;align-items:center;justify-content:center;gap:8px}.category-label{font-size:16px;line-height:24px;font-weight:600;white-space:nowrap}.chevron-down{width:16px;height:16px;display:block;flex:0 0 16px;color:var(--ink)}.global-search{height:40px;flex:1;border:1px solid var(--line);border-radius:8px;padding:0 14px;color:var(--ink)}.header-actions{display:flex;align-items:center;gap:15px}.round{border:0;background:none;font-size:19px;color:#667085}.avatar{width:38px;height:38px;border-radius:50%;background:#dbe4f7;display:grid;place-items:center;font-weight:700}.profile{display:flex;align-items:center;gap:9px;font-size:12px}.profile strong{display:block;font-size:13px}
    .page{max-width:1204px;margin:24px auto 64px;padding:0 0;display:grid;grid-template-columns:232px minmax(0,1fr);gap:24px}.sidebar{border:1px solid var(--line);border-radius:16px;overflow:hidden;align-self:start;padding:12px 0}.menu,.sub{width:100%;display:flex;align-items:center;gap:10px;border:0;background:#fff;color:var(--ink);text-align:left}.menu{height:52px;padding:0 24px;font-size:16px;font-weight:600}.sub{height:50px;padding:0 24px 0 52px;color:var(--muted);font-size:14px}.sub.active{color:var(--brand);border-left:4px solid var(--brand);padding-left:48px;background:#fff}.menu-icon{width:18px;text-align:center}.chev{margin-left:auto}.workspace h1{font-size:18px;line-height:28px;margin:0 0 6px}.tabs{display:flex;height:55px;border-bottom:1px solid var(--divider);gap:5px}.tab{position:relative;border:0;background:#fff;padding:0 13px;color:var(--muted);cursor:pointer}.tab.active{color:var(--ink);font-weight:600}.tab.active:after{content:"";position:absolute;height:3px;background:var(--brand);left:8px;right:8px;bottom:-1px}
    .filters{display:grid;grid-template-columns:minmax(260px,1fr) 150px 150px 64px;gap:10px;margin:16px 0}.field{height:40px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--muted);padding:0 12px}.search-wrap{position:relative}.search-wrap:before{content:"⌕";position:absolute;left:12px;top:8px;font-size:18px;color:#667085}.search-wrap input{width:100%;padding-left:36px}.reset{border:0;background:#f5f6f9;color:var(--faint);border-radius:8px}.list{display:flex;flex-direction:column;gap:14px}.card{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}.meta{height:42px;padding:0 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);font-size:11px}.id{font-weight:700;color:#475467}.dot{color:#c3c7ce}.badge{font-weight:600}.green{color:var(--green)}.blue{color:#2e90fa}.orange{color:var(--orange)}.red{color:var(--red)}.deadline{margin-left:auto;text-align:right;color:var(--faint)}.deadline strong{display:block;color:var(--red);font-size:11px}.body{padding:13px 16px 10px}.title{font-size:12px;font-weight:700;margin-bottom:13px}.facts{display:grid;grid-template-columns:1.2fr .75fr 1.45fr .8fr;gap:22px;font-size:11px}.label{display:block;color:var(--faint);margin-bottom:3px}.value{font-weight:600;color:#475467}.more-items{display:block;color:var(--faint);margin-top:2px}.actions{height:43px;border-top:1px solid var(--divider);display:flex;justify-content:flex-end;align-items:center;gap:10px;padding:0 8px}.link{border:0;background:#fff;color:var(--blue);font-weight:600;font-size:11px;cursor:pointer}.primary{border:0;border-radius:5px;background:var(--brand);color:#fff;padding:8px 12px;font-weight:600;font-size:11px}.more{height:30px;width:34px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--muted);font-weight:700}.pagination{display:flex;align-items:center;gap:4px;margin-top:16px}.page-btn{width:34px;height:34px;border:0;background:#fff;color:#475467;border-radius:5px}.page-btn.active{border:1px solid #5b7cfa;color:#2b50c8}.page-btn:disabled{color:#c6cad1;background:#f5f6f9}.toast{position:fixed;right:24px;bottom:24px;background:#344054;color:#fff;padding:12px 18px;border-radius:8px;box-shadow:0 8px 24px #10182833;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:none}
    @media(max-width:900px){.utility{display:none}.header{padding:10px 18px}.category,.profile div{display:none}.page{margin:18px;grid-template-columns:1fr}.sidebar{display:none}.filters{grid-template-columns:1fr 1fr}.search-wrap{grid-column:1/-1}.facts{grid-template-columns:1fr 1fr}.deadline{display:none}}@media(max-width:520px){.global-search{display:none}.filters{grid-template-columns:1fr}.search-wrap{grid-column:auto}.facts{grid-template-columns:1fr}.page{margin:14px}.tabs{overflow:auto}.utility{display:none}}
  </style>
</head>
<body>
  <div class="utility"><nav><a href="#">Beranda</a><a href="#">Pengadaan</a><a href="#">Bantuan</a><a href="#">Tentang Kami</a></nav><div>⌖ Dikirim ke <span class="ship">Kantor Cabang Bandung⌄</span></div></div>
  <header class="header"><div class="logo"><span class="logo-mark"></span><span>PaDi UMKM</span></div><button class="category" aria-label="Buka kategori" aria-expanded="false"><span class="category-content"><span class="category-label">Kategori</span><svg class="chevron-down" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg></span></button><input class="global-search" placeholder="Cari produk di sini..." aria-label="Cari produk"><div class="header-actions"><button class="round" aria-label="Notifikasi">♧</button><button class="round" aria-label="Pesan">✉</button><button class="round" aria-label="Keranjang">⌑</button><div class="profile"><span class="avatar">BS</span><div><strong>Buyer Satu</strong>PT Telkom Indonesia</div><span>⌄</span></div></div></header>
  <main class="page"><aside class="sidebar"><button class="menu"><span class="menu-icon">⇄</span>Negosiasi</button><button class="menu"><span class="menu-icon">♙</span>Kompetisi<span class="chev">⌃</span></button><button class="sub">Tambah Kompetisi</button><button class="sub">Draf Kompetisi</button><button class="sub active">Kompetisi Saya</button><button class="menu"><span class="menu-icon">☑</span>Persetujuan PPK</button><button class="menu"><span class="menu-icon">▣</span>Pesanan</button><button class="menu"><span class="menu-icon">▱</span>Chat</button></aside>
    <section class="workspace"><h1>Kompetisi Saya</h1><div class="tabs" role="tablist"><button class="tab active" data-filter="all">Semua</button><button class="tab" data-filter="active">Berlangsung</button><button class="tab" data-filter="done">Selesai</button><button class="tab" data-filter="cancelled">Dibatalkan</button></div>
      <div class="filters"><div class="search-wrap"><input id="search" class="field" placeholder="Cari judul kompetisi / ID kompetisi" aria-label="Cari kompetisi"></div><select id="sort" class="field"><option>Urutkan</option><option>Terbaru</option><option>Terlama</option></select><select id="status" class="field"><option value="all">Semua Status</option><option value="active">Berlangsung</option><option value="done">Selesai</option><option value="cancelled">Dibatalkan</option></select><button id="reset" class="reset">Reset</button></div>
      <div id="cards" class="list"></div><div class="pagination"><button class="page-btn" disabled>‹</button><button class="page-btn active">1</button><button class="page-btn">2</button><button class="page-btn">3</button><button class="page-btn">4</button><button class="page-btn">5</button><span>…</span><button class="page-btn">9</button><button class="page-btn">›</button></div>
    </section></main><div id="toast" class="toast" role="status"></div>
  <script>
    const competitions=[
      {state:'active',status:'Segera Dibuka',tone:'green',title:'Pembangunan Ruang Komputer Kantor Dinas Pendidikan Bandung',offer:'-',type:'Itemized (Bisa Menawar Satuan)',total:'Rp8.000.000'},
      {state:'active',status:'Konstruksi',tone:'blue',title:'Judul Kompetisi Pembangunan Gedung Kantor Pemda Kabupaten Bandung',product:'Bandung, Babakan Ciparay (Kab.)',productLabel:'Lokasi',offer:'10',offerLabel:'Jumlah Penawar',type:'Pemerintah Daerah Bandung',typeLabel:'Instansi',total:'Rp1.499.900.000'},
      {state:'active',status:'Penawaran Ditutup',tone:'orange',title:'Pembangunan Ruang Komputer Kantor Dinas Pendidikan Bandung',offer:'10',type:'Itemized (Bisa Menawar Satuan)',total:'Rp8.000.000',action:'Mulai Evaluasi'},
      {state:'active',status:'Masa Evaluasi',tone:'orange',title:'Pembangunan Ruang Komputer Kantor Dinas Pendidikan Bandung',offer:'10',type:'Itemized (Bisa Menawar Satuan)',total:'Rp8.000.000',action:'Pilih Pemenang'},
      {state:'active',status:'Menunggu Konfirmasi',tone:'green',title:'Pembangunan Ruang Komputer Kantor Dinas Pendidikan Bandung',offer:'10',type:'Itemized (Bisa Menawar Satuan)',total:'Rp8.000.000',deadline:'Berakhir pada',deadlineValue:'◷ 1 Maret 2024, 22:00 WIB'},
      {state:'done',status:'Kompetisi Selesai',tone:'green',title:'Pembangunan Ruang Komputer Kantor Dinas Pendidikan Bandung',offer:'10',type:'Itemized (Bisa Menawar Satuan)',total:'Rp8.000.000'},
      {state:'cancelled',status:'Kompetisi Dibatalkan',tone:'red',title:'Pembangunan Ruang Komputer Kantor Dinas Pendidikan Bandung',offer:'10',type:'Itemized (Bisa Menawar Satuan)',total:'Rp8.000.000'}
    ];
    const cards=document.querySelector('#cards'), search=document.querySelector('#search'), status=document.querySelector('#status'); let selected='all';
    function card(c,i){return `<article class="card"><div class="meta"><span class="id">#MK003610</span><span class="dot">•</span><span class="badge ${c.tone}">${c.status}</span><span class="dot">•</span><span>Tanggal Penawaran : <b>01 Okt 2024 - 01 Des 2024</b></span>${c.deadline?`<span class="deadline">${c.deadline}<strong>${c.deadlineValue}</strong></span>`:''}</div><div class="body"><div class="title">${c.title}</div><div class="facts"><div><span class="label">${c.productLabel||'RAM Komputer'}</span><span class="value">${c.product||'80pcs x Rp100.000'}</span>${!c.product?'<span class="more-items">+1 barang lainnya</span>':''}</div><div><span class="label">${c.offerLabel||'Jumlah Penawar'}</span><span class="value">${c.offer}</span></div><div><span class="label">${c.typeLabel||'Jenis Penawaran'}</span><span class="value">${c.type}</span></div><div><span class="label">Total HPS Kompetisi</span><span class="value">${c.total}</span></div></div></div><div class="actions"><button class="link" data-detail="${i}">Lihat Detail</button>${c.action?`<button class="primary" data-action="${c.action}">${c.action}</button>`:''}<button class="more" aria-label="Menu lainnya">•••</button></div></article>`}
    function render(){const q=search.value.toLowerCase();const filter=status.value!=='all'?status.value:selected;cards.innerHTML=competitions.filter(c=>(filter==='all'||c.state===filter)&&(`${c.title} mk003610`.toLowerCase().includes(q))).map(card).join('')||'<p>Tidak ada kompetisi yang cocok.</p>'}
    document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelector('.tab.active').classList.remove('active');t.classList.add('active');selected=t.dataset.filter;status.value='all';render()});search.oninput=render;status.onchange=render;document.querySelector('#reset').onclick=()=>{search.value='';status.value='all';selected='all';document.querySelector('.tab.active').classList.remove('active');document.querySelector('.tab').classList.add('active');render()};
    document.addEventListener('click',e=>{const text=e.target.dataset.action||(e.target.dataset.detail!==undefined?'Detail kompetisi #MK003610 dibuka':'');if(text){const toast=document.querySelector('#toast');toast.textContent=text;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2200)}});render();
  </script>
</body>
</html>
