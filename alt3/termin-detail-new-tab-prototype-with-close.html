    const backdrop = document.getElementById("backdrop");
    const openModalButton = document.getElementById("openModalButton");
    const closeModalButton = document.getElementById("closeModalButton");
    const openDetailButton = document.getElementById("openDetailButton");
    const popupHint = document.getElementById("popupHint");

    function openModal() {
      backdrop.classList.add("open");
      backdrop.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      backdrop.classList.remove("open");
      backdrop.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function openDetailInNewTab() {
      const newTab = window.open("", "_blank");

      if (!newTab) {
        popupHint.classList.add("show");
        setTimeout(() => popupHint.classList.remove("show"), 3000);
        return;
      }

      newTab.document.open();
      newTab.document.write(`
        <!DOCTYPE html>
        <html lang="id">
        <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <title>Detail Pesanan - Kantor Cabang Bogor</title>
          <style>
            * {
              box-sizing: border-box;
            }

            html,
            body {
              margin: 0;
              min-height: 100%;
              background: #ffffff;
            }

            .detail-page {
              position: relative;
              width: min(1450px, 100vw);
              aspect-ratio: 1450 / 1036;
              margin: 0 auto;
              background-image: url("${detailImage}");
              background-size: contain;
              background-position: center top;
              background-repeat: no-repeat;
            }

            .close-tab-hotspot {
              position: absolute;
              left: 14.3%;
              top: 14.8%;
              width: 3.5%;
              height: 4.5%;
              border: 0;
              background: transparent;
              cursor: pointer;
            }

            .close-tab-hotspot:focus-visible {
              outline: 3px solid rgba(29, 78, 216, 0.28);
              outline-offset: 3px;
              border-radius: 6px;
            }
          </style>
        </head>
        <body>
          <main class="detail-page" aria-label="Detail Pesanan">
            <button
              id="closeTabButton"
              class="close-tab-hotspot"
              aria-label="Kembali ke halaman sebelumnya">
            </button>
          </main>

          <script>
            const closeTabButton = document.getElementById("closeTabButton");

            closeTabButton.addEventListener("click", () => {
              if (window.opener && !window.opener.closed) {
                window.opener.focus();
              }

              window.close();
            });
          <\/script>
        </body>
        </html>
      `);
      newTab.document.close();
      newTab.focus();
    }

    openModalButton.addEventListener("click", openModal);
    closeModalButton.addEventListener("click", closeModal);
    openDetailButton.addEventListener("click", openDetailInNewTab);

    backdrop.addEventListener("mousedown", event => {
      if (event.target === backdrop) closeModal();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && backdrop.classList.contains("open")) {
        closeModal();
      }
    });
  </script>
</body>
</html>
